sections:
  type: objects
  default: []
  schema:
    name: link section
    identifier: text
    properties:
      text:
        type: string
        required: true
        validations:
          min_length: 1
          max_length: 1000
      title:
        type: string
        validations:
          min_length: 1
          max_length: 1000
      links:
        type: objects
        schema:
          name: link
          identifier: text
          properties:
            text:
              type: string
              required: true
              validations:
                min_length: 1
                max_length: 1000
            url:
              type: string
              required: true
              validations:
                min_length: 1
                max_length: 2048
            target:
              type: enum
              default: _blank
              choices:
                - _blank
                - _self
                - _parent
                - _top
            title:
              type: string
              validations:
                min_length: 1
                max_length: 1000
            referrer_policy:
              type: enum
              default: no-referrer-when-downgrade
              choices:
                - no-referrer
                - no-referrer-when-downgrade
                - origin
                - origin-when-cross-origin
                - unsafe-url
            translations:
              type: objects
              schema:
                name: translation
                identifier: locale
                properties:
                  locale:
                    type: enum
                    required: true
                    choices:
